aid: endor-labs
url: https://raw.githubusercontent.com/api-evangelist/endor-labs/refs/heads/main/apis.yml
name: Endor Labs
kind: company
description: Endor Labs is a software supply chain security and application security
  platform built around reachability-based Software Composition Analysis (SCA),
  SBOM/VEX, secrets and SAST scanning, CI/CD discovery, and AI security. Its public
  REST API at https://api.endorlabs.com/v1 is a uniform resource API over namespaces,
  exposing projects, packages, findings, policies, scan results, and more, driven by
  the endorctl CLI.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Security
- Software Supply Chain
- SCA
- Reachability
- AppSec
- AI Security
created: '2026-06-20'
modified: '2026-06-20'
specificationVersion: '0.19'
