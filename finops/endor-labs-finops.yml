  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Endor Labs
serviceCategory: Security
billingModel:
  pricingCategory: Commitment-Based
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Usage
  - Adjustment
focusColumns:
  ServiceName: Endor Labs Platform
  ServiceCategory: Security
  ProviderName: Endor Labs
  PublisherName: Endor Labs
  InvoiceIssuerName: Endor Labs
  BillingCurrency: USD
  ChargeCategory: Purchase
