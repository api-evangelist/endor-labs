meters:
- name: developers
  description: Developers covered by the subscription, a common packaging dimension.
  unit: developers
  aggregation: max
  dimensions:
  - tenant
  - namespace
- name: repositories
  description: Repositories onboarded and scanned across the tenant.
  unit: repositories
  aggregation: max
  dimensions:
  - tenant
  - namespace
- name: projects_scanned
  description: Project resources scanned, attributable per namespace for allocation.
  unit: projects
  aggregation: sum
  dimensions:
  - tenant
  - namespace
- name: scan_results
  description: Scan executions completed, useful for internal activity allocation.
  unit: scans
  aggregation: sum
  dimensions:
  - tenant
  - namespace
- name: findings
  description: Findings produced, allocated to teams via namespaces for accountability.
  unit: findings
  aggregation: sum
  dimensions:
  - tenant
  - namespace
principles:
- name: Visibility
  description: Use the REST API to pull projects, scan-results, and findings per namespace to see where platform value accrues.
- name: Allocation
  description: Organize teams and applications into namespaces so platform cost can be mapped to internal cost centers.
- name: Optimization
  description: Prioritize remediation on reachable findings to focus security effort where it reduces real risk and rework.
- name: Accountability
  description: Assign namespace owners; review onboarded repositories and developer counts against the contracted subscription scope.
maintainers:
