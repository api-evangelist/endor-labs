description: >-
  FinOps view of Endor Labs spend. Endor Labs is sold as a sales-led
  subscription rather than transparent usage-based metering, so cost is
  committed annually and allocated internally by the dimensions that drive
  packaging - typically developers, repositories, applications, or namespaces
  scanned. The REST API and endorctl make it possible to attribute platform
  value (projects scanned, findings, policy outcomes) back to teams and cost
  centers via namespaces even though billing itself is contract-based.
notes: >-
  Endor Labs does not publish per-unit rates; subscription terms are
  negotiated. Meters below model the allocation dimensions an organization can
  track internally, not provider-billed usage units. Confirm contract scope and
  any usage-based components with Endor Labs during reconciliation.
sources:
- https://www.endorlabs.com/pricing
- https://www.endorlabs.com
- https://docs.endorlabs.com/rest-api/
